# SonarQube / SonarCloud project configuration for accubook.
#
# Run with:   sonar-scanner -Dsonar.token=$SONAR_TOKEN
# Or via CI:  sonar-scanner -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.token=$SONAR_TOKEN
#
# Without a Sonar server, scanner output is uploaded nowhere — see
# docs/SonarQubeAnalysis.md for the local-only equivalent we run today.

sonar.projectKey=accubook
sonar.projectName=AccuBook
sonar.projectVersion=0.1.0
sonar.organization=

# --- Sources ---
sonar.sources=src
sonar.tests=tests,src
sonar.test.inclusions=**/__tests__/**/*.ts,**/__tests__/**/*.tsx,tests/**/*.ts,tests/**/*.tsx,tests/**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/.next/**,**/generated/**,**/dist/**,**/build/**,**/*.d.ts,**/coverage/**,**/playwright-report/**,**/test-results/**

# --- Language / TS ---
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.environments=browser,node
sonar.javascript.node.maxspace=4096

# --- Quality gates ---
sonar.coverage.exclusions=**/__tests__/**,**/*.spec.ts,tests/**,prisma/**,scripts/**,**/*.config.ts,**/*.config.mjs,middleware.ts,src/middleware.ts
sonar.cpd.exclusions=src/generated/**,**/__tests__/**

# --- Coverage import (run `vitest run --coverage` first to generate lcov) ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- ESLint import (optional; run `eslint . --format json --output-file eslint-report.json`) ---
sonar.eslint.reportPaths=eslint-report.json
